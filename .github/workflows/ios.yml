name: iOS Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

        - name: Build iOS
  run: |
    xcodebuild -list
    xcodebuild -workspace NutroApp.xcworkspace -scheme NutroApp -configuration Release
